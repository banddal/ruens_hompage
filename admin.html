<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Homo Ruens Admin</title>
<link rel="stylesheet" href="admin.css" />
</head>
<body>
<main class="admin-shell">
  <header class="admin-hero">
    <div>
      <p class="eyebrow">Portfolio Admin</p>
      <h1>프로젝트와 첨부파일 관리</h1>
      <p>Portfolio 프로젝트의 글, 이미지, PDF/PPT/HWP 첨부파일을 백엔드 JSON DB에 저장합니다.</p>
    </div>
    <a class="site-link" href="/">사이트 보기</a>
  </header>

  <section class="admin-grid">
    <aside class="project-list-panel">
      <div class="panel-head">
        <h2>Projects</h2>
        <button type="button" id="reloadProjects">새로고침</button>
      </div>
      <input id="projectSearch" class="admin-input" type="search" placeholder="프로젝트 검색" />
      <div id="projectList" class="project-list" aria-live="polite"></div>
    </aside>

    <section class="editor-panel">
      <div class="panel-head">
        <h2>Project Editor</h2>
        <button type="button" id="newProject">새 프로젝트</button>
      </div>

      <form id="projectForm" class="project-form">
        <div class="form-row two">
          <label>
            ID
            <input name="id" class="admin-input" required />
          </label>
          <label>
            Slug
            <input name="slug" class="admin-input" />
          </label>
        </div>

        <div class="form-row two">
          <label>
            제목
            <input name="title" class="admin-input" required />
          </label>
          <label>
            핵심 지표
            <input name="metric" class="admin-input" />
          </label>
        </div>

        <div class="form-row three">
          <label>
            분류
            <select name="category" class="admin-input">
              <option>Plan</option>
              <option>Strategy</option>
              <option>Operation</option>
              <option>Communication</option>
            </select>
          </label>
          <label>
            기간
            <input name="period" class="admin-input" />
          </label>
          <label>
            상태
            <select name="status" class="admin-input">
              <option value="published">published</option>
              <option value="draft">draft</option>
              <option value="private">private</option>
            </select>
          </label>
        </div>

        <label>
          카드 요약
          <textarea name="short" class="admin-input" rows="2"></textarea>
        </label>

        <label>
          상세 설명
          <textarea name="description" class="admin-input" rows="4"></textarea>
        </label>

        <label>
          역할
          <textarea name="role" class="admin-input" rows="3"></textarea>
        </label>

        <label>
          결과
          <textarea name="outcome" class="admin-input" rows="3"></textarea>
        </label>

        <div class="form-row two">
          <label>
            태그, 쉼표 구분
            <input name="tags" class="admin-input" />
          </label>
          <label>
            역량 태그
            <input name="skillTags" class="admin-input" placeholder="plan, strategy" />
          </label>
        </div>

        <div class="form-actions">
          <button type="submit" class="primary">프로젝트 저장</button>
          <span id="saveStatus" class="status-text"></span>
        </div>
      </form>

      <section class="upload-grid">
        <form id="imageUploadForm" class="upload-card">
          <h3>이미지 업로드</h3>
          <input name="file" type="file" accept="image/png,image/jpeg,image/webp,image/avif" required />
          <input name="title" class="admin-input" placeholder="이미지 제목" />
          <input name="caption" class="admin-input" placeholder="캡션" />
          <input name="alt" class="admin-input" placeholder="대체 텍스트" />
          <button type="submit">이미지 추가</button>
        </form>

        <form id="fileUploadForm" class="upload-card">
          <h3>첨부파일 업로드</h3>
          <input name="file" type="file" accept=".hwp,.hwpx,.pdf,.ppt,.pptx,.doc,.docx,.xls,.xlsx" required />
          <input name="title" class="admin-input" placeholder="파일 제목" />
          <input name="description" class="admin-input" placeholder="파일 설명" />
          <select name="visibility" class="admin-input">
            <option value="request">요청 시 제공</option>
            <option value="public">공개 다운로드</option>
            <option value="private">비공개 보관</option>
          </select>
          <button type="submit">파일 추가</button>
        </form>
      </section>

      <section class="asset-panel">
        <div>
          <h3>Images</h3>
          <div id="imageList" class="asset-list"></div>
        </div>
        <div>
          <h3>Files</h3>
          <div id="fileList" class="asset-list"></div>
        </div>
      </section>
    </section>
  </section>
</main>
<script src="admin.js"></script>
</body>
</html>
